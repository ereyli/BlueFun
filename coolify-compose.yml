services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://funblue.xyz}
        NEXT_PUBLIC_BASE_RPC_URL: ${NEXT_PUBLIC_BASE_RPC_URL:-https://mainnet.base.org}
        NEXT_PUBLIC_BASE_RPC_FALLBACK_URLS: ${NEXT_PUBLIC_BASE_RPC_FALLBACK_URLS:-https://base-rpc.publicnode.com,https://base.drpc.org}
        NEXT_PUBLIC_ROBINHOOD_RPC_URL: ${NEXT_PUBLIC_ROBINHOOD_RPC_URL:-https://rpc.mainnet.chain.robinhood.com}
        NEXT_PUBLIC_ROBINHOOD_RPC_FALLBACK_URLS: ${NEXT_PUBLIC_ROBINHOOD_RPC_FALLBACK_URLS:-}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_BLUE_STAKING_GOVERNANCE: ${NEXT_PUBLIC_BLUE_STAKING_GOVERNANCE:-0xA7DEa156cD6a0a8D5e0c25e94e20E670b426cF26}
        NEXT_PUBLIC_BLUE_REVENUE_ROUTER: ${NEXT_PUBLIC_BLUE_REVENUE_ROUTER:-0x18EdA8de1aFd6B6329BaF742A9eb73F93ec6B741}
        NEXT_PUBLIC_BLUE_STAKING_VAULT: ${NEXT_PUBLIC_BLUE_STAKING_VAULT:-0x221a86096a334BcaFd5E561564dC8E6A48F19584}
        NEXT_PUBLIC_BLUE_STAKING_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_BLUE_STAKING_DEPLOYMENT_BLOCK:-48678791}
        NEXT_PUBLIC_NFT_FEE_POLICY: ${NEXT_PUBLIC_NFT_FEE_POLICY:-0xc982023f393626309e13b7b75d988c273a9f7786}
        NEXT_PUBLIC_NFT_DROP_CONTROLLER: ${NEXT_PUBLIC_NFT_DROP_CONTROLLER:-0xf7fc2f208b936a5858f9ae7f7750147c8284a2c6}
        NEXT_PUBLIC_NFT_COLLECTION_FACTORY: ${NEXT_PUBLIC_NFT_COLLECTION_FACTORY:-0xd8cf5150a4d789cab4b03855d3ff536c78fd4b33}
        NEXT_PUBLIC_NFT_MARKETPLACE: ${NEXT_PUBLIC_NFT_MARKETPLACE:-0x5be0b302e32031378fdbdea3e5bb3d487e345761}
        NEXT_PUBLIC_NFT_PFP_FACTORY: ${NEXT_PUBLIC_NFT_PFP_FACTORY:-0x022742905a07f4534f9794ceb8c42be23a1c6815}
        NEXT_PUBLIC_NFT_PFP_MARKETPLACE: ${NEXT_PUBLIC_NFT_PFP_MARKETPLACE:-0x8a777d7d590b658ab07b0aee90ccc51b79c2981d}
        NEXT_PUBLIC_NFT_PFP_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_PFP_DEPLOYMENT_BLOCK:-48886056}
        NEXT_PUBLIC_NFT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_DEPLOYMENT_BLOCK:-48886053}
        NEXT_PUBLIC_NFT_OFFERS: ${NEXT_PUBLIC_NFT_OFFERS:-0xdfb2ae739446fc8ffc57793005e687ce695dda64}
        NEXT_PUBLIC_NFT_OFFERS_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_OFFERS_DEPLOYMENT_BLOCK:-48886061}
        NEXT_PUBLIC_NFT_PROTOCOL_VERSION: ${NEXT_PUBLIC_NFT_PROTOCOL_VERSION:-v4}
        NEXT_PUBLIC_BASE_WETH: ${NEXT_PUBLIC_BASE_WETH:-0x4200000000000000000000000000000000000006}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_TOKEN_IMAGE_CDN_URL: ${NEXT_PUBLIC_TOKEN_IMAGE_CDN_URL:-}
        NEXT_PUBLIC_BASE_DIRECT_LAUNCH_FACTORY: ${NEXT_PUBLIC_BASE_DIRECT_LAUNCH_FACTORY:-0x394c5D0244b49e1Eed533CD3505583e504589157}
        NEXT_PUBLIC_BASE_DIRECT_LIQUIDITY_LOCKER: ${NEXT_PUBLIC_BASE_DIRECT_LIQUIDITY_LOCKER:-0x857f7D11474235D8cAfd79826d4D2E0d2B7dabd7}
        NEXT_PUBLIC_BASE_DIRECT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_BASE_DIRECT_DEPLOYMENT_BLOCK:-48678791}
        NEXT_PUBLIC_ROBINHOOD_DIRECT_LAUNCH_FACTORY: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_LAUNCH_FACTORY:-0x7de3165634679353a36886dcfe35e3521beee4a4}
        NEXT_PUBLIC_ROBINHOOD_DIRECT_LIQUIDITY_LOCKER: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_LIQUIDITY_LOCKER:-0x8550c8f626993ffb58a884cb4e9b5b8a9ee2bdf6}
        NEXT_PUBLIC_ROBINHOOD_DIRECT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_DEPLOYMENT_BLOCK:-10703400}
        NEXT_PUBLIC_FEATURED_TOKENS: ${NEXT_PUBLIC_FEATURED_TOKENS:-}
    environment:
      NODE_ENV: production
      SITE_MAINTENANCE_MODE: ${SITE_MAINTENANCE_MODE:-false}
      SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://funblue.xyz}
      POSTGRES_INDEXER_ENABLED: ${POSTGRES_INDEXER_ENABLED:-true}
      ONCHAIN_FALLBACK_ENABLED: ${ONCHAIN_FALLBACK_ENABLED:-false}
      MAX_ONCHAIN_FALLBACK_LAUNCHES: ${MAX_ONCHAIN_FALLBACK_LAUNCHES:-100}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL:-}
      RATE_LIMIT_SALT: ${RATE_LIMIT_SALT}
      PINATA_JWT: ${PINATA_JWT}
      PINATA_GATEWAY_URL: ${PINATA_GATEWAY_URL:-https://gateway.pinata.cloud/ipfs}
      TOKEN_IMAGE_CDN_URL: ${TOKEN_IMAGE_CDN_URL:-}
    expose:
      - "3000"
    restart: unless-stopped

  indexer-base:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    environment:
      NODE_ENV: production
      CHAIN_ID: "8453"
      HEALTH_PORT: "3000"
      BASE_RPC_URL: ${BASE_RPC_URL:-https://mainnet.base.org}
      BASE_RPC_FALLBACK_URLS: ${BASE_RPC_FALLBACK_URLS:-https://base-rpc.publicnode.com,https://base.drpc.org}
      CONFIRMATIONS: ${BASE_CONFIRMATIONS:-1}
      LOG_CHUNK_SIZE: ${LOG_CHUNK_SIZE:-1900}
      NFT_EVENT_LOG_CHUNK_SIZE: ${NFT_EVENT_LOG_CHUNK_SIZE:-1900}
      NFT_TRANSFER_LOG_CHUNK_SIZE: ${NFT_TRANSFER_LOG_CHUNK_SIZE:-1900}
      POLL_MS: ${BASE_POLL_MS:-2500}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL:-}
      DIRECT_LAUNCH_FACTORY: ${NEXT_PUBLIC_BASE_DIRECT_LAUNCH_FACTORY:-0x394c5D0244b49e1Eed533CD3505583e504589157}
      DIRECT_LIQUIDITY_LOCKER: ${NEXT_PUBLIC_BASE_DIRECT_LIQUIDITY_LOCKER:-0x857f7D11474235D8cAfd79826d4D2E0d2B7dabd7}
      DIRECT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_BASE_DIRECT_DEPLOYMENT_BLOCK:-48678791}
      NFT_COLLECTION_FACTORY: ${NEXT_PUBLIC_NFT_COLLECTION_FACTORY:-0xd8cf5150a4d789cab4b03855d3ff536c78fd4b33}
      NFT_DROP_CONTROLLER: ${NEXT_PUBLIC_NFT_DROP_CONTROLLER:-0xf7fc2f208b936a5858f9ae7f7750147c8284a2c6}
      NFT_MARKETPLACE: ${NEXT_PUBLIC_NFT_MARKETPLACE:-0x5be0b302e32031378fdbdea3e5bb3d487e345761}
      NFT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_DEPLOYMENT_BLOCK:-48886053}
      NFT_PFP_FACTORY: ${NEXT_PUBLIC_NFT_PFP_FACTORY:-0x022742905a07f4534f9794ceb8c42be23a1c6815}
      NFT_PFP_MARKETPLACE: ${NEXT_PUBLIC_NFT_PFP_MARKETPLACE:-0x8a777d7d590b658ab07b0aee90ccc51b79c2981d}
      NFT_PFP_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_PFP_DEPLOYMENT_BLOCK:-48886056}
      NFT_OFFERS: ${NEXT_PUBLIC_NFT_OFFERS:-0xdfb2ae739446fc8ffc57793005e687ce695dda64}
      NFT_OFFERS_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_NFT_OFFERS_DEPLOYMENT_BLOCK:-48886061}
      BLUE_STAKING_VAULT: ${NEXT_PUBLIC_BLUE_STAKING_VAULT:-0x221a86096a334BcaFd5E561564dC8E6A48F19584}
      BLUE_REVENUE_ROUTER: ${NEXT_PUBLIC_BLUE_REVENUE_ROUTER:-0x18EdA8de1aFd6B6329BaF742A9eb73F93ec6B741}
      BLUE_STAKING_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_BLUE_STAKING_DEPLOYMENT_BLOCK:-48678791}
      TOKEN_IMAGE_CDN_URL: ${TOKEN_IMAGE_CDN_URL:-}
    expose:
      - "3000"
    restart: unless-stopped

  indexer-robinhood:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    environment:
      NODE_ENV: production
      CHAIN_ID: "4663"
      HEALTH_PORT: "3000"
      RPC_URL: ${NEXT_PUBLIC_ROBINHOOD_RPC_URL:-https://rpc.mainnet.chain.robinhood.com}
      ROBINHOOD_RPC_FALLBACK_URLS: ${NEXT_PUBLIC_ROBINHOOD_RPC_FALLBACK_URLS:-}
      CONFIRMATIONS: ${ROBINHOOD_CONFIRMATIONS:-3}
      LOG_CHUNK_SIZE: ${LOG_CHUNK_SIZE:-1900}
      POLL_MS: ${ROBINHOOD_POLL_MS:-12000}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL:-}
      DIRECT_LAUNCH_FACTORY: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_LAUNCH_FACTORY:-0x7de3165634679353a36886dcfe35e3521beee4a4}
      DIRECT_LIQUIDITY_LOCKER: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_LIQUIDITY_LOCKER:-0x8550c8f626993ffb58a884cb4e9b5b8a9ee2bdf6}
      DIRECT_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_ROBINHOOD_DIRECT_DEPLOYMENT_BLOCK:-10703400}
    expose:
      - "3000"
    restart: unless-stopped

