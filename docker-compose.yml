services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bluefun
    ports:
      - "5432:5432"
    volumes:
      - bluefun-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bluefun"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  bluefun-postgres:
